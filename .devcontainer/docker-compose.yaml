services:
  dev-synapse:
    container_name: investment-portfolio-dev-container
    build:
      context: .
      dockerfile: Docker/Dockerfile
    ports:
      - 127.0.0.1:8888:20
    volumes:
      - ..:/code/
      - ${DATA_DIR}:/mnt/data
    environment:
      DEV: "True"
      DATA_DIR: "/mnt/data"
 