name: Validate on PR

on:
  pull_request:
    branches:
      - main

jobs:
  python-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: "3.12"
      - name: Run Ruff linter
        uses: astral-sh/ruff-action@v3

  python-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: "3.12"
      - name: Run tests
        run: |
          pip install -r requirements.txt
          pytest tests/
