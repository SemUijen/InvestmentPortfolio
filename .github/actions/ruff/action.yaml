name: Run Ruff linter

description: "Runs pylint on the codebase"
inputs:
  python-version:
    description: "Python version to use"
    required: true
    default: "3.12"
  working-directory:
    description: "The working directory"
    required: false
    default: "."
runs:
  using: "composite"
  steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff
      shell: bash

    - name: Run Ruff
      run: |
        ruff check $(find ${{ inputs.working-directory }} -name "*.py")
      shell: bash